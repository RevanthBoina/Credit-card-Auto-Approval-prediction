# Render Blueprint for Credit Card Approval Prediction
# Deploys both backend (Flask) and frontend (Next.js)

previewsEnabled: false

services:
  # Backend API Service
  - name: credit-approval-api
    plan: free
    region: oregon
    type: web_service
    runtime: python
    rootDir: server/web
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"

  # Frontend Web Service
  - name: credit-approval-frontend
    plan: free
    region: oregon
    type: web_service
    runtime: node
    rootDir: client
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: FLASK_API_URL
        value: https://credit-approval-api-fb03.onrender.com
