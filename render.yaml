# Render Blueprint for Credit Card Approval Prediction
# Deploys both backend (Flask) and frontend (Next.js)

previewsEnabled: false

services:
  # Frontend Web Service
  - name: credit-approval-frontend
    plan: free
    region: oregon
    type: web
    runtime: node
    rootDir: client
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: FLASK_API_URL
        value: https://credit-approval-api-fb03.onrender.com
